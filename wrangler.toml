# Portfolio MCP server — OAuth resource server (validates Auth0 JWTs, gates the tools).
# Stateless: no KV / queues / DB bindings, no secrets — the three vars below are all public.
name = "auth0-siwe-mcp"
main = "src/worker.ts"
# jose uses Web Crypto (no Node needed), but nodejs_compat is a safe backstop for the MCP SDK.
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2026-07-01"

[observability]
enabled = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true

# Non-secret config. After the first `yarn deploy` you'll know the worker's URL — set
# KEYCLOAK_AUDIENCE + MCP_SERVER_URL to `https://<that-url>/mcp` (KEYCLOAK_AUDIENCE must equal the
# value the realm's Audience mapper stamps) and redeploy. See README §8.
# KEYCLOAK_ISSUER is the realm issuer with NO trailing slash, e.g. https://<kc-host>/realms/ymax.
[vars]
KEYCLOAK_ISSUER = "https://keycloak-ymax-w4skz.sevalla.app/realms/ymax"
KEYCLOAK_AUDIENCE = "https://auth0-siwe-mcp.rs-first-cf.workers.dev/mcp"
MCP_SERVER_URL = "https://auth0-siwe-mcp.rs-first-cf.workers.dev/mcp"
